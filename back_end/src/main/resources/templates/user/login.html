<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-wrap">
    <section class="card form-card">
        <h1>로그인</h1>

        <div class="error" th:if="${error}">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/user/login}" method="post">
            <div class="input-group">
                <label for="username">아이디</label>
                <input id="username" type="text" name="username" placeholder="아이디를 입력하세요"/>
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input id="password" type="password" name="password" placeholder="비밀번호를 입력하세요"/>
            </div>
            <button class="btn btn-primary" type="submit">로그인</button>
        </form>

        <p>계정이 없으신가요? <a class="link" th:href="@{/user/signup}">회원가입</a></p>
    </section>
</div>

</body>
</html>
