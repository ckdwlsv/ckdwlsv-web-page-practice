<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 수정</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>글 수정</h1>

<!-- 게시글 수정 폼 -->
<form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post" enctype="multipart/form-data">
    <!-- 제목 입력 -->
    <label>제목 :
        <input type="text" name="title" th:value="${post.title}" required>
        <!-- th:value : 현재 게시글 제목을 input 필드에 초기값으로 설정 -->
    </label>
    <br><br>

    <!-- 내용 입력 -->
    <label>내용 : <br>
        <textarea name="content" rows="10" cols="50" th:text="${post.content}" required></textarea>
        <!-- th:text : textarea 안에 현재 게시글 내용을 표시 -->
    </label>
    <br><br>

    <!-- 기존 이미지 표시 및 삭제/교체 -->
    <div th:if="${post.images != null}">
        <p>현재 이미지:</p>
        <div th:each="image, iterStat : ${post.images}" style="margin-bottom:10px;">
            <img th:src="@{'/images/' + ${image.id}}" alt="첨부 이미지" width="200">

            <!-- 삭제 체크박스 -->
            <label>
                <input type="checkbox" name="deleteImageIds" th:value="${image.id}"> 삭제
            </label>

            <!-- 교체 파일 input -->
            <input type="file" name="replaceImageFiles" th:data-imageid="${image.id}" accept="image/*">
        </div>
    </div>

    <br>
    <div>
        <label>새 이미지 추가:</label>
        <input type="file" name="newImages" multiple accept="image/*">
    </div>
    <br>

    <button type="submit">수정 완료</button>
    <br>
</form>

<!-- 게시글 목록으로 이동 -->
<a th:href="@{/posts/list}">목록으로</a>

</body>
</html>
